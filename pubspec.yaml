name: sefab_mobile
version: 1.0.0+2
publish_to: 'none'
description: Aplicativo móvil SEFAB by Felix Cruz.

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  http: ^1.2.1
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  intl: ^0.19.0
  image:
  path_provider:
  geolocator: ^14.0.2
  flutter_map:
  latlong2:
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  device_info_plus: ^11.5.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_sefab.png
    - assets/images/fondo.png
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/icon_sefab.png
  android: true
  ios: true
  fullscreen: true

  android_12:
    color: "#FFFFFF"
    image: assets/images/icon_sefab.png
